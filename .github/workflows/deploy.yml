name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # CI: Test code and Docker
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Create data directory
      run: mkdir -p data logs
    
    - name: Test with pytest
      run: |
        pytest --cov=. --cov-report=xml || true
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          coverage.xml
          .coverage
    
    - name: Build Docker image
      run: |
        docker build -t server-health-monitor:latest .
        docker images | grep server-health-monitor
    
    - name: Run Docker container
      run: |
        docker run -d -p 5000:5000 --name test-container server-health-monitor:latest
        sleep 10
    
    - name: Test Docker container health
      run: |
        curl -v http://localhost:5000/health
        curl -f http://localhost:5000/health || exit 1
    
    - name: Test API endpoint
      run: |
        curl -f http://localhost:5000/api/metrics/current || exit 1
    
    - name: Cleanup Docker container
      run: |
        docker stop test-container
        docker rm test-container
      if: always()

  # CD: Deploy to Render (optional)
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Trigger Render Deployment
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      run: |
        if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID" ]; then
          curl -X POST \
            https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"
          echo "✅ Render deployment triggered"
        else
          echo "⚠️ Skipping deployment - RENDER_API_KEY or RENDER_SERVICE_ID not configured"
        fi
