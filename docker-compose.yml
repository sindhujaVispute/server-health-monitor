version: '3.8'

services:
  web:
    build: .
    container_name: server-health-monitor
    ports:
      - "5000:5000"
    volumes:
      # Mount data directory for persistence
      - ./data:/app/data
      # Mount logs directory
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - DATABASE_PATH=/app/data/metrics.db
      - LOG_FILE_PATH=/app/logs/app.log
      - CPU_ALERT_THRESHOLD=80
      - MEMORY_ALERT_THRESHOLD=80
      - DISK_ALERT_THRESHOLD=85
      - METRICS_REFRESH_INTERVAL=2
      - HISTORY_RETENTION_DAYS=7
    restart: unless-stopped
    networks:
      - monitor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Add Nginx for production
  nginx:
    image: nginx:alpine
    container_name: monitor-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - monitor-network
    restart: unless-stopped
    profiles:
      - production

networks:
  monitor-network:
    driver: bridge